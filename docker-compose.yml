services:
  app:
    build:
      context: ./app
      dockerfile: ../docker/Dockerfile.app
    restart: unless-stopped
    volumes:
      - ./app:/var/www/html
      - vendor:/var/www/html/vendor
      - ./docker/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=${APP_ENV:-production}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - taverne

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        VITE_REVERB_APP_KEY: ${VITE_REVERB_APP_KEY}
        VITE_REVERB_HOST: ${VITE_REVERB_HOST:-reverb}
        VITE_REVERB_PORT: ${VITE_REVERB_PORT:-8080}
        VITE_REVERB_SCHEME: ${VITE_REVERB_SCHEME:-http}
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - app
    networks:
      - taverne

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-taverne}
      POSTGRES_USER: ${DB_USERNAME:-taverne}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-taverne}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - taverne

  reverb:
    build:
      context: ./app
      dockerfile: ../docker/Dockerfile.app
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    volumes:
      - ./app:/var/www/html
      - vendor:/var/www/html/vendor
    environment:
      - REVERB_APP_ID=${REVERB_APP_ID}
      - REVERB_APP_KEY=${REVERB_APP_KEY}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET}
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - taverne

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - taverne

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"
    networks:
      - taverne

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./app:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - taverne

volumes:
  db_data:
  redis_data:
  vendor:

networks:
  taverne:
    driver: bridge
