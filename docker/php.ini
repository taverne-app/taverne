; ── Limites ────────────────────────────────────────────────────────────────
memory_limit       = 256M
max_execution_time = 60
upload_max_filesize = 20M
post_max_size       = 20M

; ── OPcache (production) ───────────────────────────────────────────────────
opcache.enable                 = 1
opcache.memory_consumption     = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files  = 20000
; validate_timestamps=0 → les fichiers ne sont jamais rechargés (production)
; passer à 1 en développement pour voir les changements sans redémarrer
opcache.validate_timestamps    = 0
opcache.revalidate_freq        = 0
opcache.enable_cli             = 0

; ── Sessions & sécurité ───────────────────────────────────────────────────
session.gc_maxlifetime = 7200
expose_php             = Off
